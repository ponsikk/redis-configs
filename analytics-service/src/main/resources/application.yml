spring:
  application:
    name: analytics-service

  # Redis Analytics instance
  redis:
    host: localhost
    port: 6382
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 2

  # Pub/Sub Redis for event listening
  redis-pubsub:
    host: localhost
    port: 6383

server:
  port: 8083

logging:
  level:
    com.analytics.aggregation: DEBUG
    org.springframework.data.redis: INFO
