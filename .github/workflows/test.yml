name: E2E Tests - Full System Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: jdbc:postgresql://localhost:5432/analytics_db
      DATABASE_USER: analytics
      DATABASE_PASSWORD: analytics123

    services:
      # PostgreSQL Database
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: analytics
          POSTGRES_PASSWORD: analytics123
          POSTGRES_DB: analytics_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis Cache (6379)
      redis-cache:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis Session Store (6380)
      redis-session:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis Rate Limiting (6381)
      redis-ratelimit:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis Analytics (6382)
      redis-analytics:
        image: redis:7-alpine
        ports:
          - 6382:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis Pub/Sub (6383)
      redis-pubsub:
        image: redis:7-alpine
        ports:
          - 6383:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis Distributed Locks (6384)
      redis-locks:
        image: redis:7-alpine
        ports:
          - 6384:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Install Redis CLI
      run: |
        sudo apt-get update
        sudo apt-get install -y redis-tools postgresql-client

    - name: Verify infrastructure health
      run: |
        echo "=== Checking PostgreSQL ==="
        pg_isready -h localhost -p 5432 -U analytics

        echo "=== Checking all 6 Redis instances ==="
        redis-cli -h localhost -p 6379 PING
        redis-cli -h localhost -p 6380 PING
        redis-cli -h localhost -p 6381 PING
        redis-cli -h localhost -p 6382 PING
        redis-cli -h localhost -p 6383 PING
        redis-cli -h localhost -p 6384 PING
        echo "✅ All infrastructure services are healthy!"

    - name: Build shared-libs (in order)
      run: |
        echo "=== Building shared-libs ==="

        cd $GITHUB_WORKSPACE/shared-libs/redis-config
        mvn clean install -DskipTests

        cd $GITHUB_WORKSPACE/shared-libs/cache-client
        mvn clean install -DskipTests

        cd $GITHUB_WORKSPACE/shared-libs/event-bus
        mvn clean install -DskipTests

        echo "✅ Shared libraries built successfully!"

    - name: Build microservices
      run: |
        echo "=== Building microservices ==="

        cd $GITHUB_WORKSPACE/api-gateway
        mvn clean package -DskipTests

        cd $GITHUB_WORKSPACE/flight-service
        mvn clean package -DskipTests

        cd $GITHUB_WORKSPACE/hotel-service
        mvn clean package -DskipTests

        cd $GITHUB_WORKSPACE/booking-service
        mvn clean package -DskipTests

        cd $GITHUB_WORKSPACE/analytics-service
        mvn clean package -DskipTests

        echo "✅ All microservices built successfully!"

    - name: Run integration tests (Redis configurations)
      run: |
        echo "=== Running Redis integration tests ==="
        cd integration-tests
        mvn test
        echo "✅ Redis integration tests passed!"

    - name: Test Cache Redis (6379)
      run: |
        cd integration-tests
        mvn test -Dtest=CacheRedisTest

    - name: Test Session Redis (6380)
      run: |
        cd integration-tests
        mvn test -Dtest=SessionRedisTest

    - name: Test Rate Limit Redis (6381)
      run: |
        cd integration-tests
        mvn test -Dtest=RateLimitRedisTest

    - name: Test Analytics Redis (6382)
      run: |
        cd integration-tests
        mvn test -Dtest=AnalyticsRedisTest

    - name: Test Pub/Sub Redis (6383)
      run: |
        cd integration-tests
        mvn test -Dtest=PubSubRedisTest

    - name: Test Distributed Locks Redis (6384)
      run: |
        cd integration-tests
        mvn test -Dtest=DistributedLockRedisTest

    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Redis Integration Tests
        path: integration-tests/target/surefire-reports/*.xml
        reporter: java-junit

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: integration-tests/target/surefire-reports/

    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: microservices-jars
        path: |
          api-gateway/target/*.jar
          flight-service/target/*.jar
          hotel-service/target/*.jar
          booking-service/target/*.jar
          analytics-service/target/*.jar

    - name: System summary
      if: always()
      run: |
        echo "=== 🎉 E2E System Check Complete ==="
        echo ""
        echo "✅ PostgreSQL (5432) - Healthy"
        echo "✅ Redis Cache (6379) - Tested"
        echo "✅ Redis Session (6380) - Tested"
        echo "✅ Redis Rate Limit (6381) - Tested"
        echo "✅ Redis Analytics (6382) - Tested"
        echo "✅ Redis Pub/Sub (6383) - Tested"
        echo "✅ Redis Locks (6384) - Tested"
        echo ""
        echo "📦 Microservices built:"
        echo "  - api-gateway (8080)"
        echo "  - flight-service (8081)"
        echo "  - hotel-service (8084)"
        echo "  - booking-service (8082)"
        echo "  - analytics-service (8083)"
        echo ""
        echo "🧪 All Redis configurations validated!"
