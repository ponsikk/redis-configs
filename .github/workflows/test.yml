name: Redis Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Redis Cache (6379)
      redis-cache:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis Session Store (6380)
      redis-session:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis Rate Limiting (6381)
      redis-ratelimit:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis Analytics (6382)
      redis-analytics:
        image: redis:7-alpine
        ports:
          - 6382:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis Pub/Sub (6383)
      redis-pubsub:
        image: redis:7-alpine
        ports:
          - 6383:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Redis Distributed Locks (6384)
      redis-locks:
        image: redis:7-alpine
        ports:
          - 6384:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Install Redis CLI
      run: |
        sudo apt-get update
        sudo apt-get install -y redis-tools

    - name: Verify Redis instances are running
      run: |
        echo "Checking all 6 Redis instances..."
        redis-cli -h localhost -p 6379 PING
        redis-cli -h localhost -p 6380 PING
        redis-cli -h localhost -p 6381 PING
        redis-cli -h localhost -p 6382 PING
        redis-cli -h localhost -p 6383 PING
        redis-cli -h localhost -p 6384 PING
        echo "All Redis instances are healthy!"

    - name: Build shared libraries
      run: |
        echo "Building shared-libs..."
        cd shared-libs/redis-config && mvn clean install -DskipTests
        cd ../cache-client && mvn clean install -DskipTests
        cd ../event-bus && mvn clean install -DskipTests

    - name: Build microservices
      run: |
        echo "Building microservices..."
        cd api-gateway && mvn clean install -DskipTests
        cd ../flight-service && mvn clean install -DskipTests
        cd ../hotel-service && mvn clean install -DskipTests
        cd ../booking-service && mvn clean install -DskipTests
        cd ../analytics-service && mvn clean install -DskipTests

    - name: Run integration tests
      run: |
        echo "Running integration tests..."
        cd integration-tests
        mvn test

    - name: Test Cache Redis (6379)
      run: |
        cd integration-tests
        mvn test -Dtest=CacheRedisTest

    - name: Test Session Redis (6380)
      run: |
        cd integration-tests
        mvn test -Dtest=SessionRedisTest

    - name: Test Rate Limit Redis (6381)
      run: |
        cd integration-tests
        mvn test -Dtest=RateLimitRedisTest

    - name: Test Analytics Redis (6382)
      run: |
        cd integration-tests
        mvn test -Dtest=AnalyticsRedisTest

    - name: Test Pub/Sub Redis (6383)
      run: |
        cd integration-tests
        mvn test -Dtest=PubSubRedisTest

    - name: Test Distributed Locks Redis (6384)
      run: |
        cd integration-tests
        mvn test -Dtest=DistributedLockRedisTest

    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Redis Integration Tests
        path: integration-tests/target/surefire-reports/*.xml
        reporter: java-junit

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: integration-tests/target/surefire-reports/
