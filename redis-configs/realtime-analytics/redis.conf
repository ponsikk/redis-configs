# Redis Configuration for Real-time Analytics
# Optimized for sorted sets, counters, and aggregations

# Network
bind 0.0.0.0
port 6382
timeout 0

# Memory Management
maxmemory 4gb
maxmemory-policy allkeys-lfu

# LFU tuning (Least Frequently Used)
lfu-log-factor 10
lfu-decay-time 1

# Persistence - Hybrid approach
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfilename "analytics.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 128mb

# Performance
tcp-backlog 511
tcp-keepalive 300

# Lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Clients
maxclients 10000

# Logging
loglevel notice
logfile "/var/log/redis/analytics.log"

# Slow log
slowlog-log-slower-than 20000
slowlog-max-len 256

# Key expiration
hz 10

# Active defragmentation for long-running instances
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 25
