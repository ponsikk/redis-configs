# Redis Configuration for Session Store
# Optimized for user session management

# Network
bind 0.0.0.0
port 6380
timeout 0

# Memory Management
maxmemory 1gb
maxmemory-policy volatile-lru

# Persistence - AOF for data durability
save ""
appendonly yes
appendfilename "sessions.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Performance
tcp-backlog 511
tcp-keepalive 60

# Lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Clients
maxclients 10000

# Logging
loglevel notice
logfile "/var/log/redis/sessions.log"

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Key expiration - moderate frequency
hz 10

# Notify for expired keys (useful for session cleanup)
notify-keyspace-events Ex
