# Redis Configuration for Distributed Locks
# Optimized for Redlock algorithm and critical sections

# Network
bind 0.0.0.0
port 6384
timeout 0

# Memory Management - Small footprint
maxmemory 512mb
maxmemory-policy volatile-ttl

# Persistence - AOF for critical lock recovery
save ""
appendonly yes
appendfilename "locks.aof"
appendfsync always
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 32mb

# Performance - Prioritize consistency over speed
tcp-backlog 511
tcp-keepalive 30

# Lazy freeing - Disabled for consistency
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no

# Clients
maxclients 5000

# Logging - Verbose for debugging lock issues
loglevel notice
logfile "/var/log/redis/locks.log"

# Slow log
slowlog-log-slower-than 5000
slowlog-max-len 128

# Key expiration - high frequency for lock cleanup
hz 20

# Notify for expired keys (lock releases)
notify-keyspace-events Ex

# Lua script time limit (for lock scripts)
lua-time-limit 5000
