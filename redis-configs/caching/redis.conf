# Redis Configuration for Caching Use Case
# Optimized for flight and hotel data caching

# Network
bind 0.0.0.0
port 6379
timeout 300

# Memory Management
maxmemory 2gb
maxmemory-policy allkeys-lru

# Eviction samples for LRU algorithm
maxmemory-samples 5

# Persistence - Disabled for pure cache
save ""
appendonly no

# Performance
tcp-backlog 511
tcp-keepalive 300

# Lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# Clients
maxclients 10000

# Logging
loglevel notice
logfile "/var/log/redis/cache.log"

# Slow log - commands taking longer than 10ms
slowlog-log-slower-than 10000
slowlog-max-len 128

# Key expiration
# Active expiration effort (1-10, higher = more CPU but faster cleanup)
hz 10
