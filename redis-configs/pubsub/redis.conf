# Redis Configuration for Pub/Sub
# Optimized for real-time messaging and notifications

# Network
bind 0.0.0.0
port 6383
timeout 0

# Memory Management - Minimal, pub/sub doesn't store data
maxmemory 256mb
maxmemory-policy noeviction

# Persistence - Disabled for pub/sub
save ""
appendonly no

# Performance
tcp-backlog 511
tcp-keepalive 60

# Pub/Sub specific
client-output-buffer-limit pubsub 32mb 8mb 60

# Clients - High for many subscribers
maxclients 15000

# Logging
loglevel notice
logfile "/var/log/redis/pubsub.log"

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 64

# Key expiration
hz 10

# Notify for all events
notify-keyspace-events KEA
