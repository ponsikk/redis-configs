# Redis Configuration for Rate Limiting
# Optimized for high-performance counters and API throttling

# Network
bind 0.0.0.0
port 6381
timeout 0

# Memory Management - Small memory footprint
maxmemory 512mb
maxmemory-policy volatile-ttl

# Persistence - Disabled, data is transient
save ""
appendonly no

# Performance - Optimized for speed
tcp-backlog 511
tcp-keepalive 300

# Lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# High number of clients for API gateway
maxclients 20000

# Logging
loglevel warning
logfile "/var/log/redis/ratelimit.log"

# Slow log - very sensitive
slowlog-log-slower-than 5000
slowlog-max-len 64

# Key expiration - high frequency for fast cleanup
hz 20

# Disable RDB/AOF background operations
stop-writes-on-bgsave-error no
