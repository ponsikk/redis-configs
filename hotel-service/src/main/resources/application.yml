spring:
  application:
    name: hotel-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/hotel_analytics}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  redis:
    cache:
      host: localhost
      port: 6379
    pubsub:
      host: localhost
      port: 6383

server:
  port: 8084

cache:
  ttl:
    hotels: 900
    cities: 3600

logging:
  level:
    com.analytics.hotel: DEBUG
